<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>memegine ops console</title>
<style>
  :root {
    --bg: #0b0c0f;
    --panel: #121419;
    --panel2: #1a1d25;
    --border: #242833;
    --text: #e7e9ec;
    --dim: #8b92a1;
    --accent: #86efac;
    --accent2: #fcd34d;
    --danger: #f87171;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px; height: 100%; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel); }
  header .logo { font-weight: 700; letter-spacing: 0.02em; }
  header .brand-row { display: flex; align-items: center; gap: 8px; }
  header select { background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px;
    font-size: 13px; }
  header .tagline { color: var(--dim); font-style: italic; font-size: 12px; }
  main { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 49px); }
  aside { border-right: 1px solid var(--border); background: var(--panel);
    overflow-y: auto; padding: 12px; }
  aside h3 { text-transform: uppercase; letter-spacing: 0.08em;
    font-size: 11px; color: var(--dim); margin: 14px 0 6px; }
  aside h3:first-child { margin-top: 0; }
  aside .watch-row, aside .ref-row { padding: 6px 8px; border-radius: 6px;
    font-size: 13px; cursor: pointer; display: flex; justify-content: space-between;
    gap: 6px; }
  aside .watch-row:hover, aside .ref-row:hover { background: var(--panel2); }
  aside .watch-row .handle { font-family: var(--mono); }
  aside .watch-row .rm { color: var(--dim); opacity: 0; }
  aside .watch-row:hover .rm { opacity: 1; }
  aside input[type=text] { width: 100%; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px;
    font-size: 13px; font-family: var(--mono); }
  aside button { width: 100%; background: var(--accent); color: #0b0c0f;
    border: 0; border-radius: 6px; padding: 6px 10px; font-weight: 600;
    cursor: pointer; font-size: 12px; margin-top: 6px; }
  section.feed { overflow-y: auto; padding: 14px; }
  .fetch-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .fetch-row input { flex: 1; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px;
    font-family: var(--mono); font-size: 13px; }
  .fetch-row button { background: var(--accent2); color: #0b0c0f; border: 0;
    border-radius: 6px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
  .tweet { background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .tweet .head { display: flex; align-items: baseline; gap: 8px;
    color: var(--dim); font-size: 12px; margin-bottom: 4px; }
  .tweet .handle { color: var(--text); font-weight: 700; font-family: var(--mono); }
  .tweet .name { color: var(--dim); }
  .tweet .text { line-height: 1.45; white-space: pre-wrap; word-wrap: break-word;
    font-size: 14px; margin: 6px 0 8px; }
  .tweet .sub { color: var(--dim); font-size: 12px; display: flex; gap: 14px;
    flex-wrap: wrap; }
  .tweet .actions { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tweet .actions button { background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px;
    cursor: pointer; font-size: 12px; }
  .tweet .actions button:hover { border-color: var(--accent); color: var(--accent); }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; z-index: 10; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; width: min(900px, 92vw);
    max-height: 85vh; overflow-y: auto; }
  .modal h2 { margin: 0 0 10px; font-size: 16px; }
  .modal pre { background: #000; border: 1px solid var(--border);
    border-radius: 6px; padding: 10px; font-family: var(--mono); font-size: 11px;
    overflow-x: auto; white-space: pre-wrap; }
  .modal .match-row { display: flex; gap: 8px; padding: 6px 0;
    border-bottom: 1px solid var(--border); }
  .modal .match-row .score { background: var(--accent); color: #0b0c0f;
    border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 700;
    min-width: 28px; text-align: center; }
  .modal .match-row img { max-width: 80px; max-height: 80px; border-radius: 4px; }
  .modal button.primary { background: var(--accent2); color: #0b0c0f;
    border: 0; border-radius: 6px; padding: 8px 14px; font-weight: 600;
    cursor: pointer; margin-top: 10px; }
  .modal button.secondary { background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px;
    cursor: pointer; margin-top: 10px; margin-left: 6px; }
  .empty { color: var(--dim); font-style: italic; padding: 20px; text-align: center; }
  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #0b0c0f; padding: 8px 16px; border-radius: 6px;
    font-weight: 600; font-size: 13px; opacity: 0; transition: opacity 0.2s; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">memegine · ops console</div>
  <div class="brand-row">
    <span id="tagline" class="tagline"></span>
    <select id="brand-select"></select>
  </div>
</header>

<main>
  <aside>
    <h3>Watchlist</h3>
    <div id="watchlist"></div>
    <input id="watch-input" type="text" placeholder="@handle or tweet-url" />
    <button id="watch-add">+ add / fetch</button>

    <h3>Refs</h3>
    <div id="refs-count" class="empty" style="padding: 4px 0;">loading…</div>
  </aside>

  <section class="feed">
    <div class="fetch-row">
      <input id="fetch-input" type="text" placeholder="paste tweet URL to fetch…" />
      <button id="fetch-btn">Fetch</button>
    </div>
    <div id="feed"></div>
  </section>
</main>

<div id="modal-bg" class="modal-bg">
  <div class="modal" id="modal"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const GROK = "https://grok.com/imagine";

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(res.status + " " + txt);
  }
  return res.json();
}
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 1800);
}
function esc(s) {
  return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    toast("copied");
  } catch (e) {
    // fallback
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
    toast("copied");
  }
}

async function loadBrand() {
  const b = await api("/api/brand");
  document.getElementById("tagline").textContent = b.tagline ? `"${b.tagline}"` : "";
  const sel = document.getElementById("brand-select");
  sel.innerHTML = "";
  b.projects.forEach(p => {
    const o = document.createElement("option");
    o.value = p; o.textContent = p;
    if (p === b.active) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = async () => {
    await api("/api/brand", {
      method: "POST", headers: {"content-type": "application/json"},
      body: JSON.stringify({name: sel.value}),
    });
    await Promise.all([loadBrand(), loadWatchlist(), loadFeed(), loadRefsCount()]);
    toast(`brand: ${sel.value}`);
  };
}

async function loadWatchlist() {
  const list = await api("/api/watchlist");
  const root = document.getElementById("watchlist");
  if (!list.length) {
    root.innerHTML = '<div class="empty" style="padding:4px 0;">no handles yet</div>';
    return;
  }
  root.innerHTML = list.map(w =>
    `<div class="watch-row" data-handle="${esc(w.handle)}">
       <span class="handle">@${esc(w.handle)}</span>
       <span class="rm" title="remove">✕</span>
     </div>`).join("");
  root.querySelectorAll(".watch-row").forEach(row => {
    const h = row.dataset.handle;
    row.querySelector(".rm").onclick = async (e) => {
      e.stopPropagation();
      await fetch(`/api/watchlist/${encodeURIComponent(h)}`, {method: "DELETE"});
      loadWatchlist();
    };
    row.querySelector(".handle").onclick = () => filterFeed(h);
  });
}

let feedFilter = null;
function filterFeed(h) {
  feedFilter = (feedFilter === h) ? null : h;
  loadFeed();
}

async function loadFeed() {
  const url = feedFilter ? `/api/tweets?handle=${encodeURIComponent(feedFilter)}` : "/api/tweets";
  const feed = await api(url);
  const root = document.getElementById("feed");
  if (!feed.length) {
    root.innerHTML = '<div class="empty">no tweets yet — paste a URL above to fetch your first one.</div>';
    return;
  }
  root.innerHTML = feed.map(t => tweetCard(t)).join("");
  feed.forEach(t => bindTweetActions(t));
}

function tweetCard(t) {
  const date = (t.created_at || "").slice(0, 16).replace("T", " ");
  const symbols = (t.symbols || []).map(s => `$${esc(s)}`).join(" ");
  return `
    <div class="tweet" id="tw-${t.id}">
      <div class="head">
        <span class="handle">@${esc(t.handle)}</span>
        <span class="name">${esc(t.author_name)}</span>
        <span>· ${esc(date)}</span>
      </div>
      <div class="text">${esc(t.text)}</div>
      <div class="sub">
        <span>♥ ${t.favorite_count.toLocaleString()}</span>
        <span>💬 ${t.reply_count.toLocaleString()}</span>
        ${symbols ? `<span>${symbols}</span>` : ""}
        <a href="${esc(t.url)}" target="_blank" style="color: var(--dim); margin-left: auto;">open on X ↗</a>
      </div>
      <div class="actions">
        <button data-act="grab" data-id="${t.id}">📎 grab ref</button>
        <button data-act="brief" data-id="${t.id}">✍ brief</button>
        <button data-act="video" data-id="${t.id}">🎬 video</button>
        <button data-act="copy" data-id="${t.id}">📋 copy url</button>
      </div>
    </div>`;
}

function bindTweetActions(t) {
  const card = document.getElementById(`tw-${t.id}`);
  if (!card) return;
  card.querySelectorAll("button[data-act]").forEach(btn => {
    btn.onclick = () => handleAction(btn.dataset.act, t);
  });
}

async function handleAction(act, t) {
  if (act === "copy") {
    copyToClipboard(t.url);
    logAction(t.id, "copy");
    return;
  }
  if (act === "grab") {
    return openReplyForModal(t);
  }
  if (act === "brief") {
    return openBriefModal(t, "image");
  }
  if (act === "video") {
    return openBriefModal(t, "video");
  }
}

async function openReplyForModal(t) {
  const modal = document.getElementById("modal");
  const bg = document.getElementById("modal-bg");
  modal.innerHTML = '<div class="empty">planning…</div>';
  bg.classList.add("open");
  const plan = await api("/api/reply-for", {
    method: "POST", headers: {"content-type": "application/json"},
    body: JSON.stringify({url_or_id: t.url, generate_brief: true}),
  });
  const refs = plan.ref_matches || [];
  const fmts = plan.format_matches || [];
  modal.innerHTML = `
    <h2>Reply to @${esc(t.handle)}</h2>
    <div style="color: var(--dim); font-size: 12px; margin-bottom: 8px;">
      ${esc(plan.keywords.slice(0,10).join(", "))}
    </div>
    <h3 style="font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em;">Library refs</h3>
    ${refs.length ? refs.map(r => `
      <div class="match-row">
        <span class="score">${r.score}</span>
        <div style="flex:1;">
          <div style="font-family: var(--mono); font-size: 11px; color: var(--dim);">${esc(r.id)}</div>
          <div style="font-size: 13px;">${esc(r.description)}</div>
          <div style="font-size: 11px; color: var(--dim);">${r.hits.map(esc).join(", ")}</div>
        </div>
        ${r.media_path ? `<img src="/api/refs/${encodeURIComponent(r.id)}/media" />` : ""}
        <button class="secondary" onclick="downloadRef('${esc(r.id)}', '${t.id}')">↓ save</button>
      </div>`).join("") : '<div class="empty">no library matches — generate a new brief below.</div>'}
    <h3 style="font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 14px;">Format suggestions</h3>
    ${fmts.map(f => `
      <div class="match-row">
        <span class="score">${f.score}</span>
        <div style="flex:1;">
          <div style="font-family: var(--mono); font-size: 12px;">${esc(f.slug)}</div>
          <div style="font-size: 11px; color: var(--dim);">${f.hits.map(esc).join(", ") || "(no triggers — brand default)"}</div>
        </div>
      </div>`).join("")}
    ${plan.brief ? `
      <h3 style="font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 14px;">Brief ready (${esc(plan.chosen_format)})</h3>
      <pre>${esc((plan.brief || "").slice(0, 1200))}${(plan.brief || "").length > 1200 ? "\n... (truncated — copy to see full)" : ""}</pre>
      <button class="primary" onclick="copyAndOpen('${t.id}', 'brief', '${esc(plan.chosen_format || "")}')">📋 Copy + open Grok</button>
    ` : ""}
    <button class="secondary" onclick="closeModal()">close</button>
    <script>window._lastBrief = ${JSON.stringify(plan.brief || "")};<\/script>
  `;
  // Inject brief content again via a property so the copy-on-click works.
  window._lastBrief = plan.brief || "";
  window._lastTweetId = t.id;
  window._lastFormat = plan.chosen_format || "";
}

async function openBriefModal(t, kind) {
  const modal = document.getElementById("modal");
  const bg = document.getElementById("modal-bg");
  modal.innerHTML = '<div class="empty">generating…</div>';
  bg.classList.add("open");
  const intent = `reply art tied to tweet by @${t.handle}: "${t.text.slice(0,180)}"`;
  const r = await api("/api/brief", {
    method: "POST", headers: {"content-type": "application/json"},
    body: JSON.stringify({intent, kind}),
  });
  window._lastBrief = r.full_prompt;
  window._lastTweetId = t.id;
  window._lastFormat = r.format_slug;
  modal.innerHTML = `
    <h2>${kind === "video" ? "Video" : "Image"} brief · ${esc(r.format_slug)}</h2>
    <pre>${esc(r.full_prompt.slice(0, 1500))}${r.full_prompt.length > 1500 ? "\n... (truncated — copy to see full)" : ""}</pre>
    <button class="primary" onclick="copyAndOpen('${t.id}', '${kind === 'video' ? 'video' : 'brief'}', '${esc(r.format_slug)}')">📋 Copy + open Grok</button>
    <button class="secondary" onclick="closeModal()">close</button>
  `;
}

function closeModal() {
  document.getElementById("modal-bg").classList.remove("open");
}
document.getElementById("modal-bg").onclick = (e) => {
  if (e.target.id === "modal-bg") closeModal();
};

async function copyAndOpen(tweetId, kind, slug) {
  await copyToClipboard(window._lastBrief || "");
  window.open(GROK, "_blank");
  logAction(tweetId, kind, slug);
  closeModal();
}

async function downloadRef(refId, tweetId) {
  window.open(`/api/refs/${encodeURIComponent(refId)}/media`, "_blank");
  logAction(tweetId, "grab_ref", refId);
}

async function logAction(tweetId, kind, slug = "") {
  fetch("/api/actions", {
    method: "POST", headers: {"content-type": "application/json"},
    body: JSON.stringify({tweet_id: tweetId, kind, slug_or_ref_id: slug}),
  });
}

async function fetchTweet() {
  const inp = document.getElementById("fetch-input");
  const url = inp.value.trim();
  if (!url) return;
  try {
    await api("/api/tweets/fetch", {
      method: "POST", headers: {"content-type": "application/json"},
      body: JSON.stringify({url_or_id: url}),
    });
    inp.value = "";
    await Promise.all([loadWatchlist(), loadFeed()]);
    toast("fetched");
  } catch (e) {
    toast("fetch failed — check URL");
  }
}
document.getElementById("fetch-btn").onclick = fetchTweet;
document.getElementById("fetch-input").addEventListener("keydown", e => {
  if (e.key === "Enter") fetchTweet();
});

document.getElementById("watch-add").onclick = async () => {
  const v = document.getElementById("watch-input").value.trim();
  if (!v) return;
  if (v.includes("/status/") || /^\d+$/.test(v)) {
    // URL or ID — fetch a tweet instead.
    document.getElementById("fetch-input").value = v;
    document.getElementById("watch-input").value = "";
    return fetchTweet();
  }
  await api("/api/watchlist", {
    method: "POST", headers: {"content-type": "application/json"},
    body: JSON.stringify({handle: v}),
  });
  document.getElementById("watch-input").value = "";
  loadWatchlist();
};

async function loadRefsCount() {
  const refs = await api("/api/refs?limit=500");
  document.getElementById("refs-count").textContent = `${refs.length} in library`;
}

async function boot() {
  await Promise.all([loadBrand(), loadWatchlist(), loadFeed(), loadRefsCount()]);
  // Auto-refresh feed every 30s.
  setInterval(loadFeed, 30000);
}
boot();
</script>
</body>
</html>
