# Prompt fragments — named reusable craft snippets.
#
# Operator writes LIGHTING.harsh_window anywhere in a prompt brief and the
# memegine prompt-engine expands it to the snippet body. This is the
# fastest way to compound — once a snippet proves it works, NEVER write
# it out longhand again; reference by code.
#
# Format: category.name: one-line or multi-line string.
# Category is uppercase; name is lowercase_snake_case.

LENS:
  # Prime lenses by focal length
  24mm_2_8: "24mm f/2.8 wide, slight distortion at edges, deep scene"
  28mm_1_8: "28mm f/1.8 street lens, environmental context retained"
  35mm_1_4: "35mm f/1.4 prime, shallow depth of field, natural perspective"
  50mm_1_8: "50mm f/1.8 prime, natural perspective, subject isolation"
  50mm_1_2: "50mm f/1.2, razor-thin DOF, dreamlike subject separation"
