  85mm_1_8: "85mm f/1.8 portrait lens, smooth background fall-off"
  100mm_macro: "100mm macro, tack-sharp details, shallow DOF on small subjects"
  135mm_2: "135mm f/2, heavy compression, portraits feel monumentalized"
  200mm_2_8: "200mm f/2.8 tele, massive compression, distant subject feels pulled in"
  # Zooms
