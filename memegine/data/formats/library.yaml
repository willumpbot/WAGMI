  # -------- Kilroy formats --------
  # Kilroy brand: a chalk-graffiti peek figure + "KILROY WAS HERE" tag
  # overlaid in a corner of a realistic base photo. Kilroy is never the
  # subject — always the signature. See data/projects/kilroy/playbooks/
  # kilroy-brand.md for the full brand rules.

  - slug: kilroy_tags_news_photo
    kind: image
    description: |
      PRIMARY Kilroy format. A real-looking archival news / documentary
      photograph with a small chalk Kilroy peek figure and "KILROY WAS
      HERE" hand-lettered in a corner. Layer 1 looks FOUND; Layer 2
      looks DRAWN. Base photo reads as genuine press-photojournalism
      — NO AI tells. Kilroy is pure white chalk on dark surfaces or
      pure black sharpie on light ones, never tinted, drawn with one
      continuous line.
    prompt_scaffold: |
      Archival press photograph: {historical_moment}, shot on {camera_and_film},
      {lighting_condition}, {aspect}, period-accurate props and wardrobe.
      In the {placement}, a chalk-drawn peek figure: bald head, two dot
      eyes, long drooping nose extending below the edge, four fingers
      gripping the top — drawn with one continuous line, obviously
      hand-made. Directly below, hand-lettered block caps in the same
      chalk: "KILROY WAS HERE". The base photo reads as a real press
      archive — grain, halation, slight yellowing. The Kilroy tag reads
      as a GI graffito added on top. No retouching, no AI-smooth faces,
      no lens flares unless the era calls for them.
    good_models: [aurora, flux_pro_via_grok, ideogram_via_grok]
    slot_hints:
      historical_moment: [
        "D-Day landing craft approaching Omaha Beach, June 1944",
        "NASA Mission Control during Apollo 11 landing, July 1969",
        "Trump at Trump Tower lobby, 1987",
        "Lehman Brothers employees leaving with boxes, September 2008",
        "Paul Volcker in his Federal Reserve office, 1979",
        "Berlin Wall with crowd on top, November 1989",
        "1987 stock exchange floor on Black Monday",
      ]
      camera_and_film: [
        "Leica M3 with Tri-X 400 pushed one stop",
        "Rolleiflex 2.8F with Plus-X",
        "Speed Graphic press camera with Super-XX, flashbulb",
        "Nikon F with Kodachrome 64 (color era)",
      ]
      lighting_condition: [
        "natural overcast daylight, no fill",
        "press-flash halation, harsh drop-off behind subject",
        "single-source tungsten, deep shadows",
        "fluorescent office ceiling lights, slight green cast",
      ]
      placement: [
        "bottom-right corner of the frame, on a concrete wall",
        "lower-left, on a filing cabinet",
        "in the background on a stall door",
        "on a ship's hull in the lower third",
        "on a newspaper page edge visible in frame",
      ]
      aspect: ["4x5 press-camera ratio", "35mm 3:2", "square 6x6 Rolleiflex"]

