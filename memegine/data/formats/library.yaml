  # -------- Spong face-swap (the "spongify" move) --------
  # Take a real photo (news, celebrity, cartel still, anonymous crowd)
  # and replace the subject's HEAD with a Spongmonkey: photo-cutout
  # monkey head + HUGE googly eyes + open singing mouth. The body /
  # wardrobe / scene stays photo-real. This is EXACTLY what Joel Veitch
  # did at rathergood.com in 2003 — it's the brand's canonical move.

  - slug: spong_face_swap_portrait
    kind: image
    description: |
      A photo of someone with their HEAD replaced by a Spongmonkey —
      blurry photo-cutout monkey head with HUGE googly eyes and open
      singing mouth — while the body, wardrobe, and scene remain
      photo-real. The gap between 'real photo' and 'cursed monkey head'
      IS the joke. Most canonical Spong move.
    prompt_scaffold: |
      A {source_photo_type}: {subject_context}, real photograph
      aesthetic, {scene_details}. The person's HEAD is replaced by a
      spongmonkey — a blurry photo-cutout of a real monkey head with
      {fur_color} fur, HUGE white googly eyes nearly touching each
      other with tiny black pinpoint pupils, open singing mouth
      showing cream buck teeth and red gums — sized to match the
      original head, matte-edged (obvious cutout), slightly off-center
      so it looks pasted not painted. The body, wardrobe, and entire
      rest of the scene stay photo-real; only the head is replaced.
      2003 Joel Veitch / rathergood-era jpeg compression on the
      monkey head cutout, while the background stays sharper. Caption
      at the bottom, hand-scrawled lowercase: "{lyric}".
      Negatives: no fully-illustrated body (body MUST stay real), no
      clean head-blend (it MUST look pasted), no modern typography,
      no smirking spongmonkey (always sincere open-mouth singing).
    good_models: [ideogram_via_grok, aurora, flux_pro_via_grok]
    slot_hints:
      source_photo_type: [
        "1987 press-flash archival portrait",
        "a 2008 courthouse walk-out photo",
        "a magazine cover shot",
        "a Wall Street Journal staff photo",
        "a cartel-era Polaroid",
        "a Casino (1995) film still",
        "a 2024 crypto conference stage photo",
