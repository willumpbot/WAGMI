        "a Wall Street banker in a pinstripe suit at a press conference",
        "a 1987 archival celebrity on a red carpet",
        "a cartel accountant at a table of cash bricks",
        "a CEO testifying at a congressional hearing",
        "a crypto founder on stage at a conference",
        "a 1990s politician at a podium",
      ]
      scene_details: [
        "flashbulb press-room halation, black tie crowd in background",
        "marble courthouse steps, reporters with mics",
        "warm tungsten 3200K room with bill-counter machines visible",
        "fluorescent congressional hearing chamber",
        "conference-blue stage lighting with logo backdrop",
