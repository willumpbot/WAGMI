  # -------- Kilroy background-integrated --------
  # Kilroy as scene detail — not a corner sticker, but visibly drawn
  # on an in-frame surface in the background (a brick wall deep behind
  # the subject, on a helmet over a shoulder, on a chart display, on
  # a whiteboard). The viewer notices the scene first, then clocks the
  # tag on second look. Highest-craft Kilroy format.

  - slug: kilroy_background_graffiti
    kind: image
    description: |
      Kilroy drawn INTO the scene — a chalk / sharpie / paint tag
      visible on a wall / helmet / whiteboard / chart / sign in the
      background of a fully staged scene. Not a corner sticker layered
      on after the fact — actually there in the environment, lit by
      the scene's own lighting. Motion-tier craft discipline on the
      base photo; Kilroy is a ~6-10% detail.
    prompt_scaffold: |
      A {scene_setup}, shot on {named_lens}, {named_film_stock},
      {named_lighting}, period-accurate props and wardrobe. In the
      {bg_surface}, a {tag_medium} Kilroy peek figure — bald head,
      long drooping nose, four fingers gripping the edge, drawn with
      one continuous line, ~6-10% of frame area — lit by the scene's
      own light (not a flat overlay). Directly below, hand-lettered
      block caps in the same medium: "KILROY WAS HERE".
      The tag reads as drawn ON the in-scene surface, shares its
      perspective and shading. The subject / main action happens in
      the foreground; Kilroy is a background detail the viewer
      discovers on second look.
      Negatives: no corner-overlay look, no flat sticker placement,
      no AI-smooth faces, no Kilroy centered or foregrounded.
    good_models: [aurora, flux_pro_via_grok, ideogram_via_grok]
    slot_hints:
      scene_setup: [
