formats:
  - slug: photoreal_portrait
    kind: image
    description: |
      Single-subject photoreal portrait. Treated like a real photograph: named
      lens, named film stock, named lighting setup, named location. Never says
      "cinematic".
    prompt_scaffold: |
      {subject}, shot on {camera_and_lens}, {film_stock_or_sensor_look},
      {lighting_setup}, {location_and_time_of_day}, {wardrobe_and_props},
      {composition_rule}, {mood_keywords}, photoreal, no CGI, sharp focus on eyes.
    good_models: [aurora, flux_pro_via_grok, nano_banana]
    slot_hints:
      camera_and_lens: [
        "Canon EOS R5 with 85mm f/1.2",
        "Leica Q3 with 28mm f/1.7",
        "Sony A7IV with 35mm f/1.4 GM",
        "Hasselblad X2D with 90mm",
      ]
      film_stock_or_sensor_look: [
        "Kodak Portra 400 look",
        "Fuji 400H pastels",
        "Cinestill 800T tungsten halation",
        "digital medium format, clean",
      ]
      lighting_setup: [
        "hard directional window light, shadow side dominant",
        "single softbox 45 degrees camera-right",
        "ambient overcast, no direct sun",
        "practical neon, mixed tungsten + daylight",
      ]
      composition_rule: [
        "rule of thirds, subject left",
        "centered medium close-up",
        "leading lines to subject",
        "negative space right half",
      ]

  - slug: meme_two_panel
    kind: image
    description: |
      Classic two-panel reaction meme. Panel one = setup. Panel two = payoff.
      Text rendered IN the image (Ideogram territory via Grok).
    prompt_scaffold: |
      Two-panel meme image, stacked vertically, equal panels.
      Top panel: {setup_scene}. Caption overlay top: "{setup_text}".
      Bottom panel: {payoff_scene}. Caption overlay bottom: "{payoff_text}".
      Impact-style white text with black stroke, dead-center each panel.
    good_models: [ideogram_via_grok, aurora]
    slot_hints:
      setup_text: ["< 6 words", "the problem / expectation"]
      payoff_text: ["< 6 words", "the reversal / punchline"]

  - slug: drake_yes_no
    kind: image
    description: |
      Drake preference meme. Top half = rejected. Bottom half = preferred.
      Needs Drake image (reference) or generated equivalent.
    prompt_scaffold: |
      Drake meme template, two vertical panels, right side text.
      Top: Drake rejecting pose, right-side caption "{rejected_text}".
      Bottom: Drake approving pose, right-side caption "{preferred_text}".
      Clean white background, bold sans-serif caption, 1:1 square.
    good_models: [ideogram_via_grok]

  - slug: photoreal_scene_motion
    kind: video
    description: |
      Short (3-6 sec) photoreal video built from one hero still + one camera move.
      Pipeline: generate photoreal still first, then img2vid with one named move.
    prompt_scaffold_still: |
      {subject_and_scene}, shot on {camera_and_lens}, {film_stock_or_sensor_look},
      {lighting_setup}, {location_and_time_of_day}, {composition_rule},
      photoreal, no CGI.
    prompt_scaffold_motion: |
      Camera move: {camera_move}. Duration: {duration_sec}s.
      Subject motion: {subject_motion}. Lighting stays consistent.
      No cuts, no zoom bloom, no style drift.
    good_models_still: [aurora, flux_pro_via_grok]
    good_models_motion: [grok_imagine_video, kling_img2vid]
    slot_hints:
      camera_move: [
        "slow push-in, 8mm total travel",
        "static lockoff with subject motion only",
        "rack focus from foreground to subject",
        "slow orbit, 15 degrees",
        "Ken Burns zoom on still, 5% over 4s",
      ]
      duration_sec: [3, 4, 5, 6]

  - slug: lore_drop
    kind: image
    description: |
      Cryptic single image + one-line ominous caption that expands a project's
      universe. No explanation, no hashtags. Image does 80% of the work.
    prompt_scaffold: |
      {cryptic_scene}, {lighting_setup}, {film_stock_or_sensor_look},
      {composition_rule}, single frame, no text overlay.
    good_models: [aurora, flux_pro_via_grok]

  - slug: cope_chart
    kind: image
    description: |
      Fake chart / absurd analysis screenshot. Dumb conclusions stated with
      authority. Text rendering is the whole game.
    prompt_scaffold: |
      Screenshot of a {chart_context} with title "{chart_title}".
      Y-axis labeled "{y_label}", x-axis labeled "{x_label}".
      One line dramatically {trend_direction}. Annotation: "{annotation}".
      Bloomberg-terminal styling, serif headings, monospace data.
    good_models: [ideogram_via_grok]

  - slug: npc_wojak_row
    kind: image
    description: |
      Row of identical NPC wojaks saying the same dumb line, then one
      differentiated wojak on the end with the enlightened take.
    prompt_scaffold: |
      Horizontal row of {n_npc} identical gray NPC wojak faces, flat color
      style, each with a speech bubble reading "{consensus_line}".
      At the far {side}, one enlightened wojak (color, detail, slight glow)
      with speech bubble reading "{enlightened_line}".
      Clean white background, comic panel framing.
    good_models: [ideogram_via_grok]
    slot_hints:
      n_npc: [3, 4, 5]
      side: [right, left]

  - slug: split_screen_then_now
    kind: image
    description: |
      Left panel: how people think it is. Right panel: how it actually is.
      Two equal-width panels, matching composition, different subject.
    prompt_scaffold: |
      Two-panel horizontal split image, equal widths, thin divider line.
      Left panel labeled "EXPECTATION": {expectation_scene}.
      Right panel labeled "REALITY": {reality_scene}.
      Same camera angle and crop style across both panels.
      {lens_and_film}, {lighting_setup}.
    good_models: [ideogram_via_grok, aurora]

  - slug: photoreal_product_shot
    kind: image
    description: |
      Tabletop product-style photo of a token/item/symbol as if shot for a
      magazine. Hero object center-frame, shallow depth, considered background.
    prompt_scaffold: |
      Studio tabletop product photograph of {object}, on {surface},
      {lens_and_film} (e.g. 100mm macro, Ektar 100), {lighting_setup}
      (e.g. single softbox top-left, white bounce card right),
      shallow depth of field, hero object centered, {background},
      no extra objects, no logos except the subject's.
    good_models: [aurora, flux_pro_via_grok]
    slot_hints:
      surface: ["brushed steel", "black felt", "weathered oak", "concrete slab"]
      background: ["seamless off-white", "deep shadow gradient", "out-of-focus plant"]

  - slug: photoreal_street_scene
    kind: image
    description: |
      Candid photoreal street photograph, subject framed in context of a
      specific city / time / weather. No staged feel.
    prompt_scaffold: |
      Candid street photograph, {subject} in {city_location}, {time_of_day},
      {weather_or_condition}, {lens_and_film} (e.g. 35mm Leica, Tri-X pushed
      to 1600), available light only, rule of thirds, foreground depth cue,
      no posing, no eye contact with camera.
    good_models: [aurora, flux_pro_via_grok]

  - slug: reaction_shot_meme
    kind: image
    description: |
      Classic single-face reaction meme — one character's expression IS the
      whole joke. Caption optional (meme works silent).
    prompt_scaffold: |
      Tight portrait of {character} showing {emotion}, shot like a candid
      screenshot, slightly soft focus, {lens_and_film}, indirect ambient
      light, centered composition, caption bar at bottom reading
      "{caption_text}" in Impact-style white with black stroke.
      If caption_text is empty, no text bar.
    good_models: [ideogram_via_grok, nano_banana]

  - slug: fake_news_headline
    kind: image
    description: |
      Fake screenshot of a news article headline + subhead + byline. Subject
      is absurd, presentation is deadpan broadsheet.
    prompt_scaffold: |
      Screenshot of a news article, {publication_style}, headline:
      "{headline}". Sub-headline: "{subhead}". Byline: "{byline}".
      Small hero image area showing {hero_image_concept}.
      Serif headline typography, sans-serif body, clean broadsheet layout,
      mobile aspect ratio if {mobile} else desktop.
    good_models: [ideogram_via_grok]
    slot_hints:
      publication_style: ["NYT broadsheet", "Bloomberg terminal", "Substack minimal", "Twitter card"]

  - slug: video_single_take_reaction
    kind: video
    description: |
      5-6s static shot, single emotion read across the face. No camera move —
      the performance IS the shot. Good for reaction content.
    prompt_scaffold_still: |
      Portrait of {character} about to {reaction_trigger}, {lens_and_film},
      {lighting_setup}, {time_of_day}, centered composition, sharp on eyes,
      natural skin texture.
    prompt_scaffold_motion: |
      Camera move: static lockoff. Duration: {duration_sec}s.
      Subject action: {reaction_description} — a slow emotional read across
      the face, no body movement beyond micro-expressions.
      Lighting stays consistent. No zoom, no pan.
    good_models_still: [aurora, flux_pro_via_grok, nano_banana]
    good_models_motion: [grok_imagine_video, kling_img2vid]

  - slug: video_kenburns_still
    kind: video
    description: |
      Ken Burns slow-push on a single photoreal still. The cheapest/fastest
      way to turn one great image into a 4-6s piece for X.
    prompt_scaffold_still: |
      {subject_and_scene}, {lens_and_film}, {lighting_setup},
      {time_of_day}, {composition_rule}.
    prompt_scaffold_motion: |
      Camera move: Ken Burns zoom-and-pan on the still. Start at
      {start_crop}, end at {end_crop}. Duration: {duration_sec}s.
      Ease-in ease-out, no bounce, no jitter.
    good_models_still: [aurora, flux_pro_via_grok]
    good_models_motion: [grok_imagine_video, runway_gen4]
    slot_hints:
      start_crop: ["full frame", "wide", "centered medium"]
      end_crop: ["tight on subject face", "tight on hands", "tight on detail"]

  - slug: photoreal_self_avatar
    kind: image
    description: |
      Photoreal portrait of a recurring self-avatar / mascot character —
      consistent face, wardrobe, location cues across multiple pieces.
      Your project's protagonist. Aim for the same fictional person
      over and over so the character becomes recognizable.
    prompt_scaffold: |
      {avatar_name}, {physical_descriptor}, {wardrobe}, in
      {location_and_time_of_day}, {lens_and_film}, {lighting_setup},
      {composition_rule}, expression: {emotion}, photoreal, same face
      across pieces (keep eyes/jawline consistent), no CGI.
    good_models: [aurora, flux_pro_via_grok, nano_banana]
    slot_hints:
      avatar_name: ["Kilroy", "the Operator", "the Intern", "Market-anon"]
      wardrobe: [
        "black hoodie, laptop bag",
        "rumpled button-up, loose tie",
        "puffer jacket, cap pulled low",
      ]
      emotion: ["cope", "smug resignation", "quiet dread", "unbothered"]

  - slug: screenshot_terminal
    kind: image
    description: |
      Screenshot-style image of a Bloomberg / terminal / exchange
      interface with a punchline embedded in the data. Ideogram
      territory. The joke IS the numbers.
    prompt_scaffold: |
      Screenshot of a {terminal_type} showing {data_content}.
      Header: "{header_text}". Main panel shows {panel_content}.
      One row is highlighted in {highlight_color} reading "{punchline_row}".
      Monospace data font, dark background, serif heading,
      pixel-accurate UI chrome, no watermarks.
    good_models: [ideogram_via_grok]
    slot_hints:
      terminal_type: [
        "Bloomberg terminal", "TradingView chart", "Hyperliquid perps UI",
        "Binance order book", "dYdX positions page",
      ]
      highlight_color: ["red", "amber", "green", "white"]

  - slug: ticker_scroll_overlay
    kind: image
    description: |
      News-chyron lower-third with an absurd ticker scroll under a straight
      photoreal image. The ticker and chyron sell the deadpan.
    prompt_scaffold: |
      Photoreal image of {subject_and_scene}, {lens_and_film},
      {lighting_setup}, {time_of_day}. Lower third: news chyron in
      red and white reading "{chyron_headline}". Below the chyron, a
      scrolling ticker reads: "{ticker_text}". Broadcast-grade sans-serif,
      thin red divider, no watermark, aspect 16:9.
    good_models: [ideogram_via_grok, aurora]
    slot_hints:
      chyron_headline: ["< 8 words", "deadpan wire-service register"]
      ticker_text: ["20-40 words, comma-separated one-liners"]

  - slug: found_footage_still
    kind: image
    description: |
      A single frame that looks pulled from a 90s documentary — 4:3,
      slight color cast, VHS-scan lines implied not shown. The
      "historical record" aesthetic for fictional events.
    prompt_scaffold: |
      Documentary-style still frame from archival footage, aspect 4:3,
      {subject_and_scene}, shot on {lens_and_film} (Canon XL1 DV look
      or VHS tape color cast), {lighting_setup} (available light only,
      no lighting kit), {time_of_day}, handheld framing, slight
      motion blur, slight chromatic aberration, low contrast,
      no CGI, no digital sharpening.
    good_models: [aurora, flux_pro_via_grok]

  - slug: zine_pullquote
    kind: image
    description: |
      Magazine / zine layout — hero photo left, huge serif pull-quote
      right. For "the headline is the piece" content. No body copy,
      no captions — the quote does everything.
    prompt_scaffold: |
      Editorial magazine layout, aspect 4:5, split vertical.
      Left half: photo of {subject_and_scene}, {lens_and_film},
      {lighting_setup}. Right half: full-bleed serif pull-quote
      reading "{quote_text}" in {serif_style}, left-aligned, ample
      white space. Attribution line small at bottom reading
      "{attribution}". No body copy, no page numbers.
    good_models: [ideogram_via_grok, aurora]
    slot_hints:
      serif_style: ["Playfair Display", "Didot", "Caslon", "Garamond"]
      quote_text: ["one sentence, <= 20 words"]
      attribution: ["one line, italicized", "source-style"]

  - slug: vhs_ad_spoof
    kind: image
    description: |
      Fake VHS-era commercial still — infomercial aesthetic. Bright
      studio lighting, wooden-set background, subject holding product,
      faded blocky text overlay. For nostalgia-bait "buy now" gags.
    prompt_scaffold: |
      1980s-1990s television commercial still frame, {subject_holding}
      against a {studio_backdrop}, flat studio key light + fill,
      shot on VHS tape, slightly oversaturated colors, small scanline
      artifacts, blocky yellow-and-red chyron at bottom reading
      "{offer_text}" (e.g. "$19.99 — CALL NOW"), 800-number overlay,
      4:3 aspect.
    good_models: [ideogram_via_grok]
    slot_hints:
      studio_backdrop: [
        "wood-paneled rec room wall",
        "gradient blue studio cyclorama",
        "stacked products on shelf",
      ]
      offer_text: ["< 8 words, all-caps, dollar amount"]

  - slug: screenshot_dm
    kind: image
    description: |
      Fake DM thread screenshot — two people, short exchange, the
      punchline is in the last message. Ideogram territory. Works when
      the joke depends on a specific voice.
    prompt_scaffold: |
      Screenshot of a direct-message thread between two people, {platform_look}
      (e.g. iMessage, Telegram, Twitter DMs). Sender avatar left, subject
      avatar right. Messages stacked chronologically.
      Message 1 (other person): "{setup_message}".
      Message 2 (you): "{response_message}".
      Message 3 (other person): "{payoff_message}".
      Realistic timestamps, realistic read receipts, pixel-accurate UI chrome,
      no watermarks.
    good_models: [ideogram_via_grok]
    slot_hints:
      platform_look: ["iMessage bubbles", "Telegram", "Twitter/X DM", "WhatsApp"]
      setup_message: ["the unsuspecting question, < 15 words"]
      response_message: ["the absurd take, < 15 words"]
      payoff_message: ["one word or emoji reaction OR a devastating follow-up"]

  - slug: polaroid_stack
    kind: image
    description: |
      Stack of 3-5 Polaroids, fanned out, one on top showing the hero
      image. Handwritten date on the white border. Low-fi, nostalgic.
    prompt_scaffold: |
      Top-down flat-lay of {n} Polaroids fanned on {surface}, top Polaroid
      visible showing {hero_scene}. Handwritten date on the white border
      reading "{date_text}" in blue ballpoint. Remaining Polaroids partially
      hidden, showing only edges. Natural diffused daylight, 3:2 aspect.
      Polaroid color signature: Polaroid 600 palette, slight magenta shift.
      No digital watermarks, no filter edges visible.
    good_models: [aurora, flux_pro_via_grok]
    slot_hints:
      n: [3, 4, 5]
      surface: ["weathered oak table", "white linen", "concrete slab", "car dashboard"]
      date_text: ["MM/DD/YY format, imperfect handwriting"]

  - slug: movie_still_quote
    kind: image
    description: |
      Cinema frame as if lifted from a 70s-90s film. Subtitle burned in at
      the bottom. Lo-fi grain. The subtitle IS the punchline.
    prompt_scaffold: |
      Cinematic film still, aspect 2.35:1 anamorphic letterbox, {subject_scene},
      shot on {film_stock} (e.g. Kodak Vision3 500T), {lighting_setup},
      grain-forward, slight gate weave implied. White subtitle text at
      bottom center reading "{subtitle_line}". Subtitle typography:
      condensed sans-serif with subtle drop shadow. No director credit,
      no title card, no timestamp.
    good_models: [ideogram_via_grok, aurora]
    slot_hints:
      subtitle_line: ["one sentence, ≤ 15 words, feels like dialogue"]
      film_stock: ["Kodak Vision3 500T", "Fuji 8592", "Kodak 5219", "VHS tape"]

  - slug: breaking_news_banner
    kind: image
    description: |
      TV-news broadcast still with an absurd chyron. "BREAKING:" banner
      top, ticker scroll bottom, serious-looking anchor or field reporter
      in frame (or a photoreal scene). Deadpan broadcast tone.
    prompt_scaffold: |
      TV news broadcast still frame, aspect 16:9, {main_image} filling the
      frame. Red "BREAKING NEWS" banner across the top with white serif
      type reading "{breaking_text}". Lower-third chyron in white on red
      reading "{chyron_subhead}". Thin ticker at bottom reading
      "{ticker_text}". Network logo bug in bottom-right corner (generic,
      no real network). Broadcast color, no ASPE fidelity, slight scanline
      feel.
    good_models: [ideogram_via_grok]
    slot_hints:
      main_image: ["photoreal scene matching the story", "field reporter mid-frame"]
      breaking_text: ["ALL-CAPS, ≤ 10 words, news register"]
      ticker_text: ["20-40 words of absurd one-liners separated by • marks"]

  - slug: document_scan
    kind: image
    description: |
      Scan or photograph of a fake official document. Letterhead, serial
      number, stamps, signature. The absurdity is in the bureaucratic
      specificity.
    prompt_scaffold: |
      Photograph or scan of a {doc_type} (e.g. legal letter, bank
      statement, medical form, lease rider), {paper_style} paper,
      letterhead at top reading "{letterhead_text}", body text reading
      "{body_text}" in serif, signature line at bottom with hand-signature
      of "{signed_name}", official-looking stamp in {stamp_color} reading
      "{stamp_text}". Slight angle, slight shadow of the phone taking
      the photo, no watermarks.
    good_models: [ideogram_via_grok]
    slot_hints:
      doc_type: ["legal notice", "HR memo", "bank statement", "lease rider", "medical form"]
      paper_style: ["cream 24lb", "generic white bond", "yellow carbonless"]
      stamp_color: ["red", "blue", "purple"]

  - slug: tombstone_meme
    kind: image
    description: |
      Dramatic "in memoriam" style image for a joke subject. Tombstone in
      a graveyard, carved text is the punchline, weather is dramatic.
    prompt_scaffold: |
      A gravestone in {graveyard_setting}, subject: the gravestone is the
      focus of the frame. Carved inscription in the stone reading
      "{inscription}". Carved dates below: "{dates}". {lighting_setup}
      (e.g. overcast, rain, single shaft of sun). Weathered stone, moss,
      slight tilt. Serif carved lettering. Composition: rule of thirds,
      stone on left third, negative space right half. Photoreal, no CGI.
    good_models: [aurora, flux_pro_via_grok]
    slot_hints:
      graveyard_setting: ["overcast rural graveyard", "foggy cemetery morning", "abandoned churchyard"]
      inscription: ["≤ 10 words, devastating"]
      dates: ["e.g. 'BULL MARKET / 2020 — 2022'"]

  - slug: whiteboard_diagram
    kind: image
    description: |
      Hand-drawn diagram on a whiteboard — arrows, boxes, percentages,
      absurd labels. Feels like a takeoff of a "galaxy-brain explainer"
      photo you'd see on X. Photo of the whiteboard, not a clean render.
    prompt_scaffold: |
      Photograph of a {whiteboard_size} whiteboard in {whiteboard_setting},
      hand-drawn diagram in dry-erase marker. Central concept boxed, arrows
      pointing out to labeled nodes. Labels include "{label_1}", "{label_2}",
      "{label_3}", arrows marked with "{arrow_note}". Some handwriting is
      clean, some is rushed. Occasional smudge. Side of the frame shows
      {reality_anchor} (e.g. a coffee cup, a stack of reports, a chair
      edge). {lighting_setup}.
    good_models: [ideogram_via_grok, aurora]
    slot_hints:
      whiteboard_size: ["large wall-mounted", "portable easel", "office mid-size"]
      whiteboard_setting: ["office conference room", "home studio", "apartment wall"]
      label_1: ["a step in the pipeline, ≤ 5 words"]
      label_2: ["a step, ≤ 5 words"]
      label_3: ["the absurd conclusion, ≤ 5 words"]
      reality_anchor: ["coffee cup", "chair edge", "stack of reports", "laptop corner"]

  - slug: podcast_clip_still
    kind: image
    description: |
      Still frame from a podcast clip — talking head in 3/4 framing, big
      burned-in subtitle at the bottom. The subtitle IS the take. For
      "guy said what?" reactive content.
    prompt_scaffold: |
      Static still frame from a podcast video, 3/4 framing of {character},
      wearing headphones, {wardrobe}, mid-sentence expression, {lens_and_film}
      (e.g. 50mm f/1.8), {lighting_setup} (e.g. soft key camera-right, warm
      practicals). Subtitle burned in at bottom center in large condensed
      sans-serif, white with black stroke, reading: "{subtitle_text}".
      Behind subject: {background} (e.g. acoustic panel wall, bookshelf,
      neon "ON AIR" sign). 16:9 aspect.
    good_models: [ideogram_via_grok, aurora]
    slot_hints:
      character: ["a tired founder", "a smug VC", "a bearded analyst"]
      wardrobe: ["black crew neck", "untucked button-up", "cheap suit"]
      subtitle_text: ["one sentence, ≤ 15 words"]
      background: ["acoustic panels", "bookshelf with books angled toward camera", "gradient LED wall"]

  - slug: magazine_cover
    kind: image
    description: |
      Fake magazine cover. Big hero image, huge cover title, cover
      lines. The cover title is usually the joke; cover lines pepper the
      absurdity across the layout.
    prompt_scaffold: |
      Magazine cover layout, aspect 3:4, hero photograph filling the
      frame showing {hero_scene}, masthead at top reading "{publication_name}"
      in {masthead_style}, main cover title in huge type reading
      "{cover_title}", cover lines running along the edges: "{cover_line_1}",
      "{cover_line_2}", "{cover_line_3}". Issue date and number small in
      corner: "{issue_line}". Barcode small at bottom. Professional
      magazine typography.
    good_models: [ideogram_via_grok, aurora]
    slot_hints:
      publication_name: ["WIRED", "GQ", "TIME", "FORBES", "VICE", "invented one"]
      masthead_style: ["large italic serif", "bold sans", "letterpressed classic"]
      cover_title: ["the main punchline, ≤ 8 words"]
      cover_line_1: ["short inline teaser, ≤ 10 words"]
      cover_line_2: ["short inline teaser, ≤ 10 words"]
      cover_line_3: ["short inline teaser, ≤ 10 words"]
      issue_line: ["Vol. X, Issue Y  MONTH YEAR"]

  - slug: receipt_photo
    kind: image
    description: |
      Photograph of a printed receipt. Itemized lines, absurd purchases.
      The joke is in the line items, usually ending with the total and
      tip.
    prompt_scaffold: |
      Photograph of a printed thermal-paper receipt from {merchant_type}
      (e.g. 7-Eleven, bodega, gas station), slightly crumpled, on
      {surface_under_receipt}. Merchant name at top reading
      "{merchant_name}", address line below, date/time, itemized lines:
      "{item_1}", "{item_2}", "{item_3}", "{item_4}". Subtotal,
      tax, total. One line stands out: "{punchline_line}". Phone camera
      angle, slight shadow, natural daylight. Thermal-paper fade at edges.
    good_models: [ideogram_via_grok]
    slot_hints:
      merchant_type: ["7-Eleven style convenience store", "dive bar", "hotel mini-bar", "airline purchase"]
      merchant_name: ["made up, plausible"]
      surface_under_receipt: ["laminate diner table", "hotel duvet", "car passenger seat"]

  - slug: billboard_roadside
    kind: image
    description: |
      A roadside billboard carrying an absurd message, seen from a moving
      car or a highway shoulder. Plate reads as a real ad — bureau
      typography, brand-style, photoreal.
    prompt_scaffold: |
      Roadside billboard photographed from {vantage}, large dominant ad
      taking most of the frame, message reading "{headline}" in bold sans,
      supporting subcopy "{subcopy}" smaller below, brand logo in corner:
      "{brand}". Surrounding: {surrounding} (e.g. telephone poles,
      interstate lights, parking lot). {time_of_day}, {lighting_setup},
      slight motion blur if from car, aspect 16:9.
